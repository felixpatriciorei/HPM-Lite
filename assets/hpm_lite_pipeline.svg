<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="500" viewBox="0 0 1100 500" role="img" aria-label="HPM-Lite experiment pipeline">
  <rect width="1100" height="500" fill="#ffffff"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#333" />
    </marker>
    <style>
      .box { fill: #ffffff; stroke: #333333; stroke-width: 2; rx: 12; }
      .soft { fill: #f7f7f7; stroke: #444444; stroke-width: 1.8; rx: 12; }
      .title { font: 700 22px system-ui, -apple-system, Segoe UI, sans-serif; fill: #111; }
      .label { font: 600 16px system-ui, -apple-system, Segoe UI, sans-serif; fill: #111; }
      .small { font: 13px system-ui, -apple-system, Segoe UI, sans-serif; fill: #333; }
      .arrow { stroke: #333; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .thin { stroke: #777; stroke-width: 1.6; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <text class="title" x="40" y="42">HPM-Lite experimental pipeline</text>
  <text class="small" x="40" y="68">Controlled recall task with explicit retrieval controls and exact-answer evaluation.</text>

  <rect class="box" x="45" y="115" width="180" height="100" />
  <text class="label" x="75" y="150">Synthetic task</text>
  <text class="small" x="70" y="176">facts + distractors</text>
  <text class="small" x="70" y="195">query after long gap</text>

  <rect class="soft" x="285" y="80" width="190" height="90" />
  <text class="label" x="315" y="115">Local baseline</text>
  <text class="small" x="315" y="142">bounded attention</text>

  <rect class="soft" x="285" y="215" width="190" height="110" />
  <text class="label" x="310" y="250">Memory variants</text>
  <text class="small" x="315" y="276">episodic / HPM-Lite</text>
  <text class="small" x="315" y="296">recurrent / Hebbian</text>

  <rect class="box" x="545" y="145" width="180" height="120" />
  <text class="label" x="575" y="182">Retrieval controls</text>
  <text class="small" x="575" y="208">normal</text>
  <text class="small" x="575" y="228">random keys</text>
  <text class="small" x="575" y="248">shuffled values</text>

  <rect class="box" x="790" y="120" width="240" height="150" />
  <text class="label" x="832" y="158">Metrics</text>
  <text class="small" x="825" y="188">exact answer accuracy</text>
  <text class="small" x="825" y="210">answer-position loss</text>
  <text class="small" x="825" y="232">retrieval precision checks</text>
  <text class="small" x="825" y="254">throughput</text>

  <rect class="soft" x="790" y="325" width="240" height="88" />
  <text class="label" x="835" y="360">Reports</text>
  <text class="small" x="820" y="386">CSV + Markdown summaries</text>

  <path class="arrow" d="M225 165 C250 140 260 125 285 125" />
  <path class="arrow" d="M225 165 C255 225 260 270 285 270" />
  <path class="arrow" d="M475 125 C510 150 520 170 545 185" />
  <path class="arrow" d="M475 270 C510 245 520 225 545 205" />
  <path class="arrow" d="M725 205 C755 198 770 195 790 195" />
  <path class="thin" d="M910 270 L910 325" />

  <text class="small" x="45" y="455">Read the charts as diagnostics, not benchmark claims: memory is useful only when normal retrieval beats controls and local baselines.</text>
</svg>
